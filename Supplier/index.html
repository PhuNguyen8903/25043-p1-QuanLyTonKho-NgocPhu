<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="../js/mock-data.js"></script>
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-top">
                <a href="../" class="logo-link">
                    <div class="brand">
                        <img src="../assets/images/logo.png" alt="logo" class="logo">
                        <h2>SMP Store</h2>
                    </div>
                </a>
                <nav class="nav-links">
                    <a href="../" class="nav-item">
                        Đơn bán hàng
                    </a>
                    <a href="../ImportOrders/" class="nav-item">
                        Đơn mua hàng
                    </a>
                    <a href="../ProductPage/" class="nav-item">
                        Sản phẩm
                    </a>
                    <a href="./" class="nav-item active" >
                        Nhà cung cấp
                    </a>
                    <a href="#" class="nav-item">
                        Tồn kho
                    </a>
                    <a href="#" class="nav-item">
                        Profile
                    </a>
                </nav>
            </div>
        </aside>
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1>Danh sách nhà cung cấp</h1>
                    <p>Quản lý thông tin nhà cung cấp</p>
                </div>
                <div class="user-box">
                    <span class="user-name">
                        Admin
                    </span>
                    <button class="logout-btn">
                        Logout
                    </button>
                </div>
            </header>
            <div class="page-content">
                <section class="action-bar">
                    <div class="search-group">
                        <input type="text" id="search-id" placeholder="Tìm mã nhà cung cấp...">
                        <input type="text" id="search-name" placeholder="Tìm tên nhà cung cấp...">
                        <button id="search-btn">
                            Tìm kiếm
                        </button>
                    </div>
                    <button class="create-btn">
                        Tạo mới
                    </button>
                </section>
                <section class="card">
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Mã</th>
                                    <th>Tên nhà cung cấp</th>
                                    <th>Số điện thoại</th>
                                    <th>Địa chỉ</th>
                                </tr>
                            </thead>
                            <tbody id="supplier-list">
                                <tr>

                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="./supplier.js"></script>
</body>

</html>
