<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMP store</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./js/main.js"></script>
    <script type="module" src="./js/mock-data.js"></script>
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-top">
                <a class="logohrf" href="./">
                <div class="brand">
                    <img src="./assets/images/logo.png" alt="logo" class="logo">
                    <h2>SMP Store</h2>
                </div>
                </a>
                
                <nav class="nav-links">
                    <a href="./ImportOrders/" class="nav-item"> Đơn mua hàng</a>
                    <a href="./ProductPage/" class="nav-item"> Sản phẩm </a>
                    <a href="#" class="nav-item"> Nhà cung cấp </a>
                    <a href="#" class="nav-item"> Tồn kho</a>
                    <a href="./profile/" class="nav-item"> Profile</a>
                </nav>
            </div>
        </aside>
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1>Trang Chính</h1>
                    <p>Quản lý đơn mua hàng và tồn kho </p>
                </div>
                <div class="user-box">
                    <div class="user-info">
                        <span class="user-name"></span>
                    </div>
                    <button class="logout-btn">Logout </button>
                </div>
            </header>
            <section class="filter-section">
                <div class="filter-group">
                    <input type="text" id="search-order-id" placeholder="Mã đơn hàng">
                    <input type="text" id="search-order-supplier" placeholder="Tên nhà cung cấp">
                    <button class="search-btn" id="search-btn">Tìm kiếm</button>
                </div>
                <button class="create-btn">Tạo mới</button>
            </section>
            <h3 class="table-title">Danh sách đơn mua hàng</h3>
            <section class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>Mã đơn</th>
                            <th>Nhà cung cấp</th>
                            <th>Ngày mua</th>
                            <th>Nhân viên</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="purchase-order-list">
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td>
                                <span class="status">
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script type="module" src="./index.js"></script>
</body>

</html>
